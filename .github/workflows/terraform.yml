name: Terraform CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.11.0"

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Install pre-commit dependencies
        run: |
          mkdir -p $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mkdir -p /tmp/tfdocs
          curl -sSLo /tmp/tfdocs/tfdocs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/terraform-docs-v0.24.0-linux-amd64.tar.gz
          tar -xzf /tmp/tfdocs/tfdocs.tar.gz -C /tmp/tfdocs
          chmod +x /tmp/tfdocs/terraform-docs
          mv /tmp/tfdocs/terraform-docs $HOME/.local/bin/
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/.local/bin

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    name: Terraform Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.11.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Test
        # Mock providers are supported in Terraform 1.7+
        # Testing relies on mock data since we don't have SPACESHIP_API_KEY / SPACESHIP_API_SECRET in untrusted PRs
        run: terraform test
